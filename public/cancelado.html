<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento Cancelado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #fef2f2, #fee2e2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    padding: 48px 36px;
    text-align: center;
    max-width: 420px;
    width: 100%;
  }
  .icon {
    width: 80px;
    height: 80px;
    background: #ef4444;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    animation: pop 0.4s ease-out;
  }
  .icon svg { width: 40px; height: 40px; stroke: #fff; }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  h1 { color: #991b1b; font-size: 24px; margin-bottom: 12px; }
  p { color: #4b5563; font-size: 16px; line-height: 1.5; margin-bottom: 28px; }
  .btn {
    display: inline-block;
    background: #dc2626;
    color: #fff;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
    transition: background 0.2s;
    margin-right: 8px;
  }
  .btn:hover { background: #b91c1c; }
  .btn-secondary {
    background: transparent;
    color: #6b7280;
    border: 1px solid #d1d5db;
  }
  .btn-secondary:hover { background: #f9fafb; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </div>
    <h1>Pagamento cancelado</h1>
    <p>Você cancelou o processo de pagamento. Nenhum valor foi cobrado. Se foi um engano, você pode tentar novamente.</p>
    <a href="/" class="btn">Tentar novamente</a>
  </div>
</body>
</html>
